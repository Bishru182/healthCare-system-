apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGINS
              value: http://localhost:30173,http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:30173
            - name: MONGO_URI
              value: mongodb://mongo:27017/appointment
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: JWT_SECRET
            - name: PATIENT_SERVICE_URL
              value: http://patient-service:3001
            - name: DOCTOR_SERVICE_URL
              value: http://doctor-service:3004
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:5005
            - name: APPOINTMENT_NOTIFICATION_CHANNELS
              value: email,sms,whatsapp
            - name: CONSULTATION_NOTIFICATION_CHANNELS
              value: email,sms,whatsapp
            - name: INTER_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: INTER_SERVICE_API_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: healthcare
spec:
  selector:
    app: appointment-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
---
