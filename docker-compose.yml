version: '3.9'

services:
  # ── Patient Service ────────────────────────────────────────────────────────
  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: medico-shared-jwt-secret-change-in-prod
      MONGO_URI: mongodb://mongo-patient:27017/patient
      APPOINTMENT_SERVICE_URL: http://appointment-service:3002
      DOCTOR_SERVICE_URL: http://doctor-service:3004
      INTER_SERVICE_API_KEY: ${INTER_SERVICE_API_KEY:-medico-internal-key-change-me}
    networks:
      - healthcare-net
    depends_on:
      - appointment-service
      - payment-service
      - doctor-service

  # ── Appointment Service ────────────────────────────────────────────────────
  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      NODE_ENV: development
      JWT_SECRET: medico-shared-jwt-secret-change-in-prod
      MONGO_URI: mongodb://mongo-appointment:27017/appointment
      PATIENT_SERVICE_URL: http://patient-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:5005
      DOCTOR_SERVICE_URL: http://doctor-service:3004
      APPOINTMENT_NOTIFICATION_CHANNELS: ${APPOINTMENT_NOTIFICATION_CHANNELS:-email,sms}
      CONSULTATION_NOTIFICATION_CHANNELS: ${CONSULTATION_NOTIFICATION_CHANNELS:-email,sms}
      INTER_SERVICE_API_KEY: ${INTER_SERVICE_API_KEY:-medico-internal-key-change-me}
    networks:
      - healthcare-net
    depends_on:
      - mongo-appointment

  # ── Payment Service ────────────────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      NODE_ENV: development
      JWT_SECRET: medico-shared-jwt-secret-change-in-prod
      MONGO_URI: mongodb://mongo-payment:27017/payment
      APPOINTMENT_SERVICE_URL: http://appointment-service:3002
      PATIENT_SERVICE_URL: http://patient-service:3001
    networks:
      - healthcare-net
    depends_on:
      mongo-payment:
        condition: service_healthy

  # ── Doctor Management Service ──────────────────────────────────────────────
  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: doctor-service
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      NODE_ENV: development
      JWT_SECRET: medico-shared-jwt-secret-change-in-prod
      MONGO_URI: mongodb://mongo-doctor:27017/doctor
      APPOINTMENT_SERVICE_URL: http://appointment-service:3002
      INTER_SERVICE_API_KEY: ${INTER_SERVICE_API_KEY:-medico-internal-key-change-me}
    networks:
      - healthcare-net
    depends_on:
      mongo-doctor:
        condition: service_healthy

  # ── Telemedicine Service ───────────────────────────────────────────────────
  telemedicine-service:
    build:
      context: ./telemedicine-service
      dockerfile: Dockerfile
    container_name: telemedicine-service
    restart: unless-stopped
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      NODE_ENV: development
      JWT_SECRET: medico-shared-jwt-secret-change-in-prod
      MONGO_URI: mongodb://mongo-telemedicine:27017/telemedicine
      APPOINTMENT_SERVICE_URL: http://appointment-service:3002
      DOCTOR_SERVICE_URL: http://doctor-service:3004
      PATIENT_SERVICE_URL: http://patient-service:3001
      JITSI_DOMAIN: meet.jit.si
    networks:
      - healthcare-net
    depends_on:
      - mongo-telemedicine
      - appointment-service

  # ── MongoDB: Patient ───────────────────────────────────────────────────────
  mongo-patient:
    image: mongo:7.0
    container_name: mongo-patient
    restart: unless-stopped
    ports:
      - '27016:27017'
    volumes:
      - mongo_patient_data:/data/db
    networks:
      - healthcare-net

  # ── MongoDB: Appointment ───────────────────────────────────────────────────
  mongo-appointment:
    image: mongo:7.0
    container_name: mongo-appointment
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_appointment_data:/data/db
    networks:
      - healthcare-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB: Payment ───────────────────────────────────────────────────────
  mongo-payment:
    image: mongo:7.0
    container_name: mongo-payment
    restart: unless-stopped
    ports:
      - '27018:27017'
    volumes:
      - mongo_payment_data:/data/db
    networks:
      - healthcare-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB: Doctor ────────────────────────────────────────────────────────
  mongo-doctor:
    image: mongo:7.0
    container_name: mongo-doctor
    restart: unless-stopped
    ports:
      - '27019:27017'
    volumes:
      - mongo_doctor_data:/data/db
    networks:
      - healthcare-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB: Telemedicine ──────────────────────────────────────────────────
  mongo-telemedicine:
    image: mongo:7.0
    container_name: mongo-telemedicine
    restart: unless-stopped
    ports:
      - '27020:27017'
    volumes:
      - mongo_telemedicine_data:/data/db
    networks:
      - healthcare-net

  # ── Notification Service ────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - '5005:5005'
    environment:
      PORT: 5005
      NODE_ENV: development
      MONGO_URI: mongodb://mongo-notification:27017/notification
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      TEXTLK_API_TOKEN: ${TEXTLK_API_TOKEN:-}
      TEXTLK_SENDER_ID: ${TEXTLK_SENDER_ID:-TextLKDemo}
      TEXTLK_SMS_API_URL: ${TEXTLK_SMS_API_URL:-https://app.text.lk/api/v3/sms/send}
      TEXTLK_SMS_TYPE: ${TEXTLK_SMS_TYPE:-plain}
      TWILIO_SID: ${TWILIO_SID:-}
      TWILIO_AUTH: ${TWILIO_AUTH:-}
      TWILIO_PHONE: ${TWILIO_PHONE:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
    networks:
      - healthcare-net
    depends_on:
      mongo-notification:
        condition: service_healthy

  # ── MongoDB: Notification ───────────────────────────────────────────────────
  mongo-notification:
    image: mongo:7.0
    container_name: mongo-notification
    restart: unless-stopped
    ports:
      - '27021:27017'
    volumes:
      - mongo_notification_data:/data/db
    networks:
      - healthcare-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  healthcare-net:
    driver: bridge

volumes:
  mongo_patient_data:
  mongo_appointment_data:
  mongo_payment_data:
  mongo_doctor_data:
  mongo_telemedicine_data:
  mongo_notification_data:
