apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
  labels:
    app: telemedicine-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: telemedicine-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: NODE_ENV
              value: production
            - name: MONGO_URI
              value: mongodb://mongo-telemedicine:27017/telemedicine
            - name: JWT_SECRET
              value: medico-shared-jwt-secret-change-in-prod
            - name: APPOINTMENT_SERVICE_URL
              value: http://appointment-service:3002
            - name: DOCTOR_SERVICE_URL
              value: http://doctor-service:3004
            - name: PATIENT_SERVICE_URL
              value: http://patient-service:3001
            - name: JITSI_DOMAIN
              value: meet.jit.si
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
spec:
  type: NodePort
  selector:
    app: telemedicine-service
  ports:
    - port: 3005
      targetPort: 3005
      nodePort: 30996
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-telemedicine
  template:
    metadata:
      labels:
        app: mongo-telemedicine
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-telemedicine
spec:
  selector:
    app: mongo-telemedicine
  ports:
    - port: 27017
      targetPort: 27017
