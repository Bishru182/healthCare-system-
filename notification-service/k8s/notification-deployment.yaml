apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: default
  labels:
    app: notification-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
    spec:
      serviceAccountName: notification-service
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5005
          protocol: TCP
        env:
        - name: PORT
          value: "5005"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: notification-config
              key: NODE_ENV
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: MONGO_URI
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: EMAIL_USER
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: EMAIL_PASS
        - name: TWILIO_SID
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: TWILIO_SID
        - name: TWILIO_AUTH
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: TWILIO_AUTH
        - name: TWILIO_PHONE
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: TWILIO_PHONE
        - name: TWILIO_WHATSAPP_FROM
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: TWILIO_WHATSAPP_FROM
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - notification-service
              topologyKey: kubernetes.io/hostname
